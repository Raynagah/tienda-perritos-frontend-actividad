name: CI/CD Tienda Perritos - Frontend

on:
  push:
    branches: [ "main" ]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # 1. Logins (DockerHub y AWS)
      - name: Docker login (DockerHub)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 2. Setup Buildx (Mejora el rendimiento de build)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build único y Push a AMBOS registros
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend-tienda-perritos:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:v${{ github.run_number }}
            ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest

      # 4. Despliegue en AWS vía SSM
      - name: Desplegar Frontend vía SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_FRONTEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Actualizar tienda-frontend desde ECR" \
            --parameters '{
              "commands":[
                "set -e",
                "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
                "docker pull ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest",
                "docker stop tienda-frontend || true",
                "docker rm tienda-frontend || true",
                "docker run -d --name tienda-frontend -p 80:80 ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest"
              ]
            }' \
            --output text